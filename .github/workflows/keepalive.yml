name: Keep VouchNet warm

# Render's free tier spins the app down after ~15 minutes of inactivity;
# the next request then takes 30-60s to wake it, which can look like the
# service is dead to a judge's agent or the skills registry's own link
# checker. Pinging every 10 minutes keeps it inside that window so it
# never actually goes to sleep.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the live service
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://vouchnet.onrender.com/api)
          echo "GET /api -> $code"
          if [ "$code" != "200" ]; then
            echo "::warning::VouchNet did not return 200 (got $code)"
          fi
